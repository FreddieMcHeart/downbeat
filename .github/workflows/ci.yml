name: ci
on: [push, pull_request]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # "true" unless every changed file is docs-only — keeps the required
          # `test` matrix checks reporting (as skipped, not missing) on
          # doc-only PRs instead of leaving them stuck "Expected" per the
          # main-protection ruleset's required_status_checks.
          filters: |
            code:
              - "**"
              - "!docs/**"
              - "!mkdocs.yml"
              - "!README.md"
              - "!CONTRIBUTING.md"
              - "!CODE_OF_CONDUCT.md"
              - "!SECURITY.md"

  pre-commit:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --locked --extra dev
      # --hook-stage pre-commit (the default) deliberately excludes the
      # commit-msg hook (conventional-pre-commit) — that one needs an actual
      # commit-msg file, not a pass over the working tree, and is already
      # enforced locally via the commit-msg git hook (see .pre-commit-config.yaml).
      - run: uv run pre-commit run --all-files

  typecheck:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --locked --extra dev
      # Scoped to cli/+core/ via [tool.pyright].include in pyproject.toml —
      # tui/ has 64 pre-existing errors (Textual query_one() -> X | None
      # narrowing), a separate cleanup from this type-checking-in-CI change.
      - run: uv run pyright

  coverage:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Needs write, not just read: on a push to main this action commits the
    # baseline coverage data to the (unprotected) python-coverage-comment-action-data
    # branch; on a PR it only needs pull-requests:write to post/update the comment.
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --locked --extra dev
      - run: uv run pytest --cov=downbeat
      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

  test:
    needs: changes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      # Step-level (not job-level) `if:` deliberately: the main-protection
      # ruleset requires each expanded "test (os, python)" context by exact
      # name. A job-level `if:` skips matrix expansion entirely and those
      # named contexts never get created, leaving doc-only PRs stuck on
      # "Expected — Waiting for status to be reported" forever. Skipping
      # every step instead still runs (and reports success for) each
      # matrix leg, just near-instantly.
      - uses: actions/checkout@v7
        if: needs.changes.outputs.code == 'true'
      - uses: astral-sh/setup-uv@v7
        if: needs.changes.outputs.code == 'true'
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --locked --extra dev
        if: needs.changes.outputs.code == 'true'
      - run: uv run ruff check .
        if: needs.changes.outputs.code == 'true'
      - run: uv run pytest -q
        if: needs.changes.outputs.code == 'true'
