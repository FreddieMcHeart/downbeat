name: ci
on: [push, pull_request]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # "true" unless every changed file is docs-only. Gates
          # pre-commit/typecheck/coverage/test below; see ci-required's
          # comment for why the required check points there, not at these
          # jobs (or their matrix legs) directly.
          #
          # predicate-quantifier MUST be "every" here, not the tool's default
          # "some": with "some", a file only needs to match ONE pattern in the
          # list to count as matching the filter, so "**" alone always matches
          # every file regardless of the "!"-exclusions below it — negation is
          # silently a no-op. Confirmed empirically on PR #6: a docs/-only diff
          # still evaluated code=true until this was added.
          predicate-quantifier: every
          filters: |
            code:
              - "**"
              - "!docs/**"
              - "!mkdocs.yml"
              - "!README.md"
              - "!CONTRIBUTING.md"
              - "!CODE_OF_CONDUCT.md"
              - "!SECURITY.md"

  pre-commit:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --locked --extra dev
      # --hook-stage pre-commit (the default) deliberately excludes the
      # commit-msg hook (conventional-pre-commit) — that one needs an actual
      # commit-msg file, not a pass over the working tree, and is already
      # enforced locally via the commit-msg git hook (see .pre-commit-config.yaml).
      - run: uv run pre-commit run --all-files

  typecheck:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --locked --extra dev
      # Scoped to cli/+core/ via [tool.pyright].include in pyproject.toml —
      # tui/ has 64 pre-existing errors (Textual query_one() -> X | None
      # narrowing), a separate cleanup from this type-checking-in-CI change.
      - run: uv run pyright

  coverage:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Needs write, not just read: on a push to main this action commits the
    # baseline coverage data to the (unprotected) python-coverage-comment-action-data
    # branch; on a PR it only needs pull-requests:write to post/update the comment.
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --locked --extra dev
      - run: uv run pytest --cov=downbeat
      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --locked --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -q

  # Single required-check target instead of the 6 expanded "test (os, python)"
  # contexts. A job-level `if:` on `test` above means a skipped run never
  # creates those per-matrix contexts at all, which would leave doc-only PRs
  # stuck on "Expected — Waiting for status to be reported" forever if the
  # ruleset required them by name. This job is itself skipped (= reports
  # success) whenever everything upstream passed or was skipped, and only
  # runs — to deliberately fail — if something upstream actually failed or
  # was cancelled. Point main-protection's required_status_checks at this
  # job's name, not at the matrix legs.
  ci-required:
    runs-on: ubuntu-latest
    needs: [pre-commit, typecheck, coverage, test]
    if: ${{ always() && (cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure')) }}
    steps:
      - run: |
          echo "::error::A required CI job failed or was cancelled."
          exit 1
