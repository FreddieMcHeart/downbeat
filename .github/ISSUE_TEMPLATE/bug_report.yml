name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Which surface is affected?
      options:
        - TUI
        - CLI
        - Library (importing claude_relay directly)
        - Claude Code skill / hooks / slash-commands
        - Packaging / install (init, uninstall)
        - Other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `claude-relay --version`
      placeholder: "claude-relay 0.1.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include exact commands/keystrokes if relevant.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `claude-relay register foo --role parent`
        2. `claude-relay send bar hi hello`
        3. ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Run with `--debug` if possible. Paste terminal output; no need for backticks, it will be auto-formatted.
      render: shell
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS + Python version
      placeholder: "macOS 15, Python 3.12"
    validations:
      required: false
