[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "claude-relay"
version = "0.1.0"
description = "TUI + CLI + library + skill for the local Claude Code relay"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Nazarii Ahapevych" }]
dependencies = [
  "textual>=0.60",
  "watchdog>=4.0",
  "rich>=13",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "textual-dev>=1.5",
  "ruff>=0.4",
]

[project.scripts]
claude-relay = "claude_relay.cli.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/claude_relay"]

[tool.hatch.build.targets.wheel.force-include]
"src/claude_relay/skill" = "claude_relay/skill"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
